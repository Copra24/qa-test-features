```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayDash – Transaction Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --info: #0891b2;
      --info-light: #cffafe;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Top nav ── */
    .navbar {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .navbar-brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar-brand svg { width: 24px; height: 24px; }
    .navbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: .875rem;
      color: var(--gray-600);
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: .875rem;
    }

    /* ── Page layout ── */
    .page { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

    .page-header {
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gray-900);
    }
    .page-header p {
      font-size: .875rem;
      color: var(--gray-500);
      margin-top: 4px;
    }

    /* ── Metric cards ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .metric-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 16px;
      border: 1px solid var(--gray-200);
    }
    .metric-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .metric-icon svg { width: 22px; height: 22px; }
    .metric-icon.blue   { background: var(--primary-light); color: var(--primary); }
    .metric-icon.green  { background: var(--success-light); color: var(--success); }
    .metric-icon.red    { background: var(--danger-light);  color: var(--danger);  }
    .metric-icon.yellow { background: var(--warning-light); color: var(--warning); }

    .metric-body { flex: 1; min-width: 0; }
    .metric-label {
      font-size: .75rem;
      font-weight: 500;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }
    .metric-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gray-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-sub {
      font-size: .75rem;
      color: var(--gray-400);
      margin-top: 2px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 16px;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: .75rem;
      font-weight: 500;
      color: var(--gray-600);
    }
    .filter-group input,
    .filter-group select {
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      font-size: .875rem;
      color: var(--gray-700);
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .filter-group input:focus,
    .filter-group select:focus { border-color: var(--primary); }

    .filter-group input[type="date"] { padding: 0 8px; min-width: 150px; }

    .filter-actions { display: flex; gap: 8px; align-items: flex-end; }

    .btn {
      height: 36px;
      padding: 0 16px;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity .15s, background .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { opacity: .9; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline {
      background: #fff;
      color: var(--gray-700);
      border: 1px solid var(--gray-300);
    }
    .btn-outline:hover { background: var(--gray-50); }

    /* inline validation message */
    .filter-error {
      width: 100%;
      font-size: .8125rem;
      color: var(--danger);
      display: none;
      margin-top: 4px;
    }
    .filter-error.visible { display: block; }

    /* ── Table card ── */
    .table-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-card-header h2 { font-size: 1rem; font-weight: 600; color: var(--gray-800); }
    .table-count { font-size: .8125rem; color: var(--gray-500); }

    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }
    thead { background: var(--gray-50); }
    th {
      padding: 10px 16px;
      text-align: left;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--gray-500);
      border-bottom: 1px solid var(--gray-200);
      white-space: nowrap;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-700);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--gray-50); }

    .tx-id { font-family: monospace; font-size: .8125rem; color: var(--gray-500); }
    .tx-customer { font-weight: 500; color: var(--gray-800); }
    .tx-amount { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
    .tx-method {
      font-size: .75rem;
      background: var(--gray-100);
      color: var(--gray-600);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Status badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .badge.success  { background: var(--success-light); color: var(--success); }
    .badge.success  .badge-dot { background: var(--success); }
    .badge.warning  { background: var(--warning-light); color: var(--warning); }
    .badge.warning  .badge-dot { background: var(--warning); }
    .badge.danger   { background: var(--danger-light);  color: var(--danger);  }
    .badge.danger   .badge-dot { background: var(--danger);  }
    .badge.info     { background: var(--info-light);    color: var(--info);    }
    .badge.info     .badge-dot { background: var(--info);    }

    /* ── Loading / empty ── */
    .state-box {
      padding: 60px 20px;
      text-align: center;
      color: var(--gray-400);
    }
    .state-box svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
    .state-box p { font-size: .9375rem; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Pagination ── */
    .pagination {
      padding: 14px 20px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pagination-info { font-size: .8125rem; color: var(--gray-500); }
    .pagination-controls { display: flex; gap: 4px; }
    .pg-btn {
      min-width: 34px; height: 34px;
      padding: 0 10px;
      border: 1px solid var(--gray-300);
      background: #fff;
      border-radius: 6px;
      font-size: .8125rem;
      color: var(--gray-600);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .pg-btn:hover:not(:disabled) { background: var(--gray-50); border-color: var(--gray-400); }
    .pg-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 600; }
    .pg-btn:disabled { opacity: .4; cursor: not-allowed; }
  </style>
</head>
<body>
