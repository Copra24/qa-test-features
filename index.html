<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayDash – Transaction Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --info: #0891b2;
      --info-light: #cffafe;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── NAV ── */
    .navbar {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--primary);
    }
    .navbar-brand svg { width: 28px; height: 28px; }
    .navbar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .875rem;
      color: var(--gray-600);
    }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: .8rem;
    }

    /* ── LAYOUT ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
    .page-subtitle { font-size: .875rem; color: var(--gray-500); margin-bottom: 24px; }

    /* ── METRICS CARDS ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .metric-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .metric-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .metric-icon svg { width: 22px; height: 22px; }
    .metric-icon.purple  { background: var(--primary-light); color: var(--primary); }
    .metric-icon.green   { background: var(--success-light); color: var(--success); }
    .metric-icon.orange  { background: var(--warning-light); color: var(--warning); }
    .metric-icon.red     { background: var(--danger-light);  color: var(--danger); }
    .metric-body { flex: 1; }
    .metric-label { font-size: .75rem; font-weight: 500; color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .metric-value { font-size: 1.6rem; font-weight: 700; color: var(--gray-900); line-height: 1; }
    .metric-sub   { font-size: .75rem; color: var(--gray-400); margin-top: 4px; }

    /* ── FILTERS ── */
    .filters-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      margin-bottom: 20px;
    }
    .filters-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-label { font-size: .75rem; font-weight: 500; color: var(--gray-600); }
    .filter-input, .filter-select {
      height: 38px;
      padding: 0 10px;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      font-size: .875rem;
      color: var(--gray-800);
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .filter-input:focus, .filter-select:focus { border-color: var(--primary); }
    .filter-input[type="date"] { padding: 0 8px; min-width: 150px; }
    .filter-select { min-width: 160px; cursor: pointer; }
    .btn {
      height: 38px;
      padding: 0 16px;
      border-radius: 6px;
      border: none;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s, background .15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { opacity: .9; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-ghost   { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
    .filter-error {
      margin-top: 8px;
      font-size: .8rem;
      color: var(--danger);
      display: none;
    }
    .filter-error.visible { display: block; }

    /* ── TABLE CARD ── */
    .table-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .table-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-title { font-weight: 600; font-size: 1rem; color: var(--gray-800); }
    .table-count { font-size: .8rem; color: var(--gray-500); }

    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--gray-50); }
    th {
      text-align: left;
      padding: 10px 16px;
      font-size: .72rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--gray-200);
      white-space: nowrap;
    }
    td {
      padding: 13px 16px;
      font-size: .875rem;
      color: var(--gray-700);
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--gray-50); }

    .txn-id    { font-family: monospace; font-size: .8rem; color: var(--gray-500); }
    .txn-party { font-weight: 500; color: var(--gray-800); }
    .txn-amount { font-weight: 600; font-family: 'Courier New', monospace; text-align: right; }

    /* ── STATUS BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .badge-success  { background: var(--success-light); color: var(--success); }
    .badge-success  .badge-dot { background: var(--success); }
    .badge-warning  { background: var(--warning-light); color: var(--warning); }
    .badge-warning  .badge-dot { background: var(--warning); }
    .badge-danger   { background: var(--danger-light);  color: var(--danger); }
    .badge-danger   .badge-dot { background: var(--danger); }
    .badge-info     { background: var(--info-light);    color: var(--info); }
    .badge-info     .badge-dot { background: var(--info); }

    /* ── LOADING / EMPTY / ERROR STATES ── */
    .state-container {
      padding: 60px 20px;
      text-align: center;
      color: var(--gray-400);
    }
    .state-container svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
    .state-container p   { font-size: .875rem; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--gray-200);
      font-size: .8rem;
      color: var(--gray-500);
    }
    .pagination-controls { display: flex; gap: 4px; }
    .page-btn {
      min-width: 32px; height: 32px;
      padding: 0 8px;
      border-radius: 6px;
      border: 1px solid var(--gray-200);
      background: #fff;
      color: var(--gray-600);
      font-size: .8rem;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-btn:hover:not(:disabled) { background: var(--gray-100); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }
    .toast {
      background: var(--gray-900);
      color: #fff;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: .85rem;
      box-shadow: var(--shadow-md);
      max-width: 320px;
      animation: slideIn .2s ease;
    }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .filters-row { flex-direction: column; }
      td:nth-child(4), th:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
